<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-label="Payment authorization flow from client to card network and back">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569" />
    </marker>
  </defs>

  <text x="20" y="40" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Payment authorization</text>

  <!-- Nodes -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">
    <rect x="20" y="100" width="150" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="95" y="135" text-anchor="middle">Client app</text>

    <rect x="205" y="100" width="150" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="280" y="135" text-anchor="middle">API gateway</text>

    <rect x="390" y="100" width="150" height="60" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" />
    <text x="465" y="135" text-anchor="middle">Payment service</text>

    <rect x="575" y="100" width="150" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="650" y="135" text-anchor="middle">Acquirer</text>

    <rect x="730" y="100" width="150" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="805" y="135" text-anchor="middle">Card network</text>
  </g>

  <!-- Forward edges -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <line x1="170" y1="130" x2="203" y2="130" marker-end="url(#arrow)" />
    <line x1="355" y1="130" x2="388" y2="130" marker-end="url(#arrow)" />
    <line x1="540" y1="130" x2="573" y2="130" marker-end="url(#arrow)" />
    <line x1="725" y1="130" x2="728" y2="130" marker-end="url(#arrow)" />
  </g>

  <!-- Return path -->
  <path d="M805 160 L805 230 L95 230 L95 162" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)" />
  <text x="450" y="222" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">authorization result (approved / declined)</text>
</svg>
