<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="Event-driven integration with a producer, broker topic, consumers, and a dead-letter queue">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#475569" />
    </marker>
  </defs>

  <text x="20" y="40" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Event-driven integration</text>

  <g font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">
    <rect x="20" y="120" width="160" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="100" y="155" text-anchor="middle">Producer</text>

    <rect x="350" y="110" width="180" height="80" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" />
    <text x="440" y="145" text-anchor="middle">Event broker</text>
    <text x="440" y="165" text-anchor="middle" font-size="11" fill="#475569">orders topic</text>

    <rect x="700" y="40" width="180" height="56" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="790" y="73" text-anchor="middle">Fulfilment</text>

    <rect x="700" y="122" width="180" height="56" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="790" y="155" text-anchor="middle">Analytics</text>

    <rect x="700" y="204" width="180" height="56" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5" />
    <text x="790" y="237" text-anchor="middle">Dead-letter queue</text>
  </g>

  <g stroke="#475569" stroke-width="1.5" fill="none">
    <line x1="180" y1="150" x2="348" y2="150" marker-end="url(#arrow2)" />
    <path d="M530 140 L700 68" marker-end="url(#arrow2)" />
    <path d="M530 150 L700 150" marker-end="url(#arrow2)" />
    <path d="M530 165 L700 232" stroke="#b91c1c" stroke-dasharray="5 4" marker-end="url(#arrow2)" />
  </g>
</svg>
