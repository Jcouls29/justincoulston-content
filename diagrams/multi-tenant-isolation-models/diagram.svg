<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-label="Three multi-tenant data isolation models: silo, bridge, and pool">
  <text x="20" y="40" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Multi-tenant isolation models</text>

  <g font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">
    <!-- Shared application tier -->
    <rect x="20" y="70" width="860" height="50" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5" />
    <text x="450" y="100" text-anchor="middle">Shared application tier</text>

    <!-- Silo -->
    <rect x="20" y="160" width="270" height="130" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="155" y="188" text-anchor="middle" font-weight="600">Silo</text>
    <text x="155" y="212" text-anchor="middle" font-size="12" fill="#475569">Database per tenant</text>
    <text x="155" y="246" text-anchor="middle" font-size="11" fill="#64748b">Strongest isolation</text>
    <text x="155" y="264" text-anchor="middle" font-size="11" fill="#64748b">Highest cost / tenant</text>

    <!-- Bridge -->
    <rect x="315" y="160" width="270" height="130" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="450" y="188" text-anchor="middle" font-weight="600">Bridge</text>
    <text x="450" y="212" text-anchor="middle" font-size="12" fill="#475569">Schema per tenant</text>
    <text x="450" y="246" text-anchor="middle" font-size="11" fill="#64748b">Balanced isolation</text>
    <text x="450" y="264" text-anchor="middle" font-size="11" fill="#64748b">Shared instance</text>

    <!-- Pool -->
    <rect x="610" y="160" width="270" height="130" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5" />
    <text x="745" y="188" text-anchor="middle" font-weight="600">Pool</text>
    <text x="745" y="212" text-anchor="middle" font-size="12" fill="#475569">Shared schema + tenant_id</text>
    <text x="745" y="246" text-anchor="middle" font-size="11" fill="#64748b">Lowest cost / tenant</text>
    <text x="745" y="264" text-anchor="middle" font-size="11" fill="#64748b">Noisy-neighbor risk</text>
  </g>

  <g stroke="#475569" stroke-width="1.5">
    <line x1="155" y1="120" x2="155" y2="158" />
    <line x1="450" y1="120" x2="450" y2="158" />
    <line x1="745" y1="120" x2="745" y2="158" />
  </g>
</svg>
